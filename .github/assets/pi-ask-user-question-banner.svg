<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">pi-ask-user-question</title>
  <desc id="desc">Dark terminal-style banner for pi-ask-user-question with a large readable wordmark and the tagline Bottom-anchored questions for pi-coding-agent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="52%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="45%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.86"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="22%" r="72%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.30"/>
      <stop offset="48%" stop-color="#7c3aed" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="34" fill="url(#glow)"/>

  <g opacity="0.18" stroke="#38bdf8" stroke-width="1">
    <path d="M92 74H1188"/>
    <path d="M92 286H1188"/>
    <path d="M160 36V324"/>
    <path d="M1120 36V324"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="92" y="58" width="1096" height="244" rx="30" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
    <rect x="118" y="88" width="1044" height="184" rx="22" fill="#020617" fill-opacity="0.32" stroke="#1e293b" stroke-width="1"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="640" y="145" text-anchor="middle" font-size="70" font-weight="900" letter-spacing="3" fill="url(#wordmark)">pi ask_user</text>
    <text x="640" y="222" text-anchor="middle" font-size="70" font-weight="900" letter-spacing="3" fill="url(#wordmark)">question</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="640" y="266" text-anchor="middle" font-size="26" font-weight="650" fill="#dbeafe">Bottom-anchored questions for pi-coding-agent</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28" font-weight="800">
    <text x="138" y="178" fill="#67e8f9">❯</text>
    <text x="1108" y="178" fill="#a78bfa">↳</text>
  </g>
</svg>
